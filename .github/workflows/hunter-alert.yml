name: SQL Hunter Daily Alert
on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:
jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send alert
        run: pip install requests && python send_alert.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PAGES_URL: https://YOUR_USERNAME.github.io/sql-hunter/
